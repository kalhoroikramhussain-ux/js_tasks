<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple_Calculator</title>
</head>
<body>
    <script>
        let num1 = Number(prompt("Enter First Number"));
        let operator = prompt("Enter operator(+ ,- ,* ,/)");
        let num2 = Number(prompt("Enter Second Number"));
        switch (operator){
            case "+":
            alert(num1 + num2);
            break;
              case "-":
            alert(num1 - num2);
            break;
              case "*":
            alert(num1 * num2);
            break;
              case "/":
            if (num2!==0);{
                alert("num1/num2");
            } 
            //  else {
            //     alert("can't be dividedb by zero");
            // }
            break;
            default:
                alert("invalid operator");
        }

    </script>
</body>
</html>
