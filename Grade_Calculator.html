<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grade_calculator</title>
</head>
<body>
   <script>
let marks=Number(prompt("Enter your marks"));
if(marks>=80){
alert("A Grade");
}
else if(marks>=60){
alert("B Grade");
}
else if (marks>=40){
alert("C Grade")
}
else {
    alert("Fail");
}
   </script> 
</body>
</html>
