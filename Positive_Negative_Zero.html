<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Positive_Negative_Zero</title>
</head>
<body>
    <script>
         let number = Number(prompt("Enter Your Number:"));
if (number > 0) {
     alert("positive Number");
}
else if (number < 0) {
    alert("negative Number");
}
else {
    alert("zero");
}
    </script>
</body>
</html>
